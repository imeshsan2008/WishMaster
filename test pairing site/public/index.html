<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WishMaster Pairing</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 { color: #333; }
    #qr-img { width: 250px; margin: 20px; }
    #code { font-size: 2rem; color: #333; }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h1>📱 WishMaster Pairing</h1>
  <div id="status">Status: Checking...</div>
  <div id="qr-section" style="display:none;">
    <img id="qr-img" src="" alt="QR Code" />
  </div>
  <div id="code-section" style="display:none;">
    <div id="code">Loading...</div>
  </div>
  <button id="switch-btn">Switch to Pairing Code</button>

  <script>
    let mode = "qr";

    async function updateStatus() {
      const res = await fetch("/status");
      const data = await res.json();
      document.getElementById("status").textContent =
        data.connected
          ? "✅ Connected: " + data.linkedJid
          : "⏳ Waiting for connection...";
    }

    async function fetchQR() {
      if (mode !== "qr") return;
      try {
        const res = await fetch("/qr");
        if (!res.ok) throw new Error();
        const data = await res.json();
        document.getElementById("qr-section").style.display = "block";
        document.getElementById("code-section").style.display = "none";
        document.getElementById("qr-img").src = data.qr;
      } catch {
        document.getElementById("qr-img").src = "";
      }
    }

    async function fetchCode() {
      if (mode !== "code") return;
      try {
        const res = await fetch("/pairing-code");
        if (!res.ok) throw new Error();
        const data = await res.json();
        document.getElementById("code-section").style.display = "block";
        document.getElementById("qr-section").style.display = "none";
        document.getElementById("code").textContent = data.code;
      } catch {
        document.getElementById("code").textContent = "Loading...";
      }
    }

    document.getElementById("switch-btn").addEventListener("click", async () => {
      const newMode = mode === "qr" ? "code" : "qr";
      await fetch("/switch-mode", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mode: newMode })
      });
      mode = newMode;
      document.getElementById("switch-btn").textContent =
        mode === "qr" ? "Switch to Pairing Code" : "Switch to QR Mode";
    });

    setInterval(updateStatus, 3000);
    setInterval(fetchQR, 4000);
    setInterval(fetchCode, 4000);
  </script>
</body>
</html>
