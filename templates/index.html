<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WishMaster</title>
  <link rel="icon" href="/assets/img/logo.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { background-color: #fefaf2; }
    .birthday-card img { width: 70px; height: 70px; object-fit: cover; }
    .today-pill { font-size:.75rem; padding:.25rem .5rem; border-radius:999px; }
    .section-header { position: sticky; top: 0; z-index: 1; }
    .status-bar { position: sticky; top: 0; z-index: 5; background: #fffbe9; border: 1px solid rgba(0,0,0,.05); }
    .wa-avatar { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; cursor: pointer; }
    .qr-box img { width: 140px; height: 140px; }
    .small-note { font-size: .8rem; color: #6c757d; }
    .sent-badge { font-size:.7rem; }
    .birthday-card { cursor: pointer; }
  </style>
</head>
<body>
<div class="container my-4">

  <!-- Status Bar -->
  <div class="status-bar rounded-3 p-3 mb-3 d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-3">
      <center class="mb-3"><img src="/assets/img/logo.png" alt="WishMaster" style="width: 100px; height: 100px;"></center>

      <div id="wa-block" class="d-flex align-items-center gap-2">
        <span class="badge text-bg-success d-none" id="wa-linked">WhatsApp: Linked</span>
        <span class="badge text-bg-warning d-none" id="wa-not-linked">WhatsApp: Not linked</span>
      </div>

      <div id="google-block" class="d-flex align-items-center gap-2">
        <span class="badge text-bg-info d-none" id="google-linked">Google: Connected</span>
        <span class="badge text-bg-secondary d-none" id="google-not-linked">Google: Not connected</span>
      </div>
    </div>       
    <img id="wa-avatar" class="wa-avatar " srcset="/assets/img/default_avatar.png" alt="WA"  title="Open WhatsApp profile"/>
  </div>

  <button id="btn-refresh" class="btn btn-sm btn-outline-primary">Refresh</button>

  <!-- Birthday Card -->
  <div class="card mt-2">
    <div class="card-header">
      <h4 id="birthday-count" class="m-0">Upcoming Birthdays (0)</h4>
    </div>
    <ul class="list-group list-group-flush" id="birthday-list"></ul>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const el = (id) => document.getElementById(id);

// ------------------ BIRTHDAYS ------------------
async function loadBirthdays() {
    try {
        const response = await fetch('/contacts');
        if (!response.ok) return;
        const data = await response.json();
        let contacts = (data || []).filter(c => c.birthday && c.birthday.month && c.birthday.day);

        const today = new Date();
        const currentYear = today.getFullYear();
        const todayMonth = today.getMonth() + 1;
        const todayDay = today.getDate();

        contacts = contacts.map(c => {
            const next = getNextBirthdayDate(c.birthday, today);
            const isToday = Number(c.birthday.month) === todayMonth && Number(c.birthday.day) === todayDay;

            // Add sent flag (mock for now, replace with API data)
            const sent = c.sent || false;

            return { ...c, _nextDate: next, _nextYear: next.getFullYear(), _isToday: isToday, sent };
        });

        contacts.sort((a, b) => a._nextDate - b._nextDate);

        const todayCurrentYear = contacts.filter(c => c._isToday && c._nextYear === currentYear);
        const yearCurrent = contacts.filter(c => c._nextYear === currentYear && !c._isToday);
        const yearNext = contacts.filter(c => c._nextYear === currentYear + 1);

        const list = el('birthday-list');
        const count = el('birthday-count');
        count.textContent = `Upcoming Birthdays (${contacts.length})`;
        list.innerHTML = '';

        if (todayCurrentYear.length) {
            addSectionHeader(list, `🎉 Today — ${formatFullDate(today)}`);
            todayCurrentYear.forEach(c => list.appendChild(renderItem(c, { highlight: true })));
        }

        addSectionHeader(list, `${currentYear}`);
        yearCurrent.forEach(c => list.appendChild(renderItem(c, { highlight: false })));

        addSectionHeader(list, `${currentYear + 1}`);
        yearNext.forEach(c => list.appendChild(renderItem(c, { highlight: false })));

    } catch (error) {
        console.error('Error loading birthdays:', error);
    }
}

function addSectionHeader(ul, title) {
    const li = document.createElement('li');
    li.className = 'list-group-item list-group-item-secondary fw-semibold section-header';
    li.textContent = title;
    ul.appendChild(li);
}

function renderItem(contact, { highlight = false } = {}) {
    const li = document.createElement('li');
    li.className = 'list-group-item d-flex align-items-center birthday-card';
    if (highlight) li.classList.add('list-group-item-warning');

    let largePhoto = 'https://via.placeholder.com/70?text=User';
    if (contact.photo && contact.photo.startsWith('https://lh3.googleusercontent.com')) {
        largePhoto = contact.photo.replace(/=s\d+$/, '=s8000');
    }

    const name = escapeHTML(contact.name || 'Unknown');
    const monthName = getMonthName(contact.birthday.month);
    const day = contact.birthday.day;
    const whenText = `${monthName} ${day}`;

    const sentBadge = contact.sent ? `<span class="badge bg-success sent-badge ms-2">Sent</span>` : '';

    li.innerHTML = `
        <img src="${largePhoto}" class="rounded-circle me-3" alt="${name}">
        <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-2">
                <strong>${name}</strong>
                ${highlight ? `<span class="badge bg-danger today-pill">TODAY</span>` : ''}
                ${sentBadge}
            </div>
            <div class="text-muted">Birthday: ${whenText}</div>
        </div>
    `;

    // Click to mark as sent
    li.addEventListener('click', async () => {
        if (!contact.sent) {
            contact.sent = true;
            li.querySelector('.flex-grow-1 .d-flex').innerHTML += `<span class="badge bg-success sent-badge ms-2">Sent</span>`;
            // Optionally call your API to save sent status
            await fetch(`/contacts/${contact.id}/mark-sent`, { method: 'POST' });
        }
    });

    return li;
}

function getMonthName(monthNumber) {
    const date = new Date(); date.setMonth(Number(monthNumber) - 1);
    return date.toLocaleString('default', { month: 'short' });
}
function getNextBirthdayDate(birthday, today) {
    const y = today.getFullYear();
    const m = Number(birthday.month) - 1;
    const d = Number(birthday.day);
    let next = safeDate(y, m, d);
    if (stripTime(next) < stripTime(today)) next = safeDate(y + 1, m, d);
    return next;
}
function safeDate(year, monthIndex, day) {
    const dt = new Date(year, monthIndex, day);
    if (dt.getMonth() !== monthIndex) return new Date(year, monthIndex, 28);
    return dt;
}
function stripTime(dt) { return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()); }
function formatFullDate(dt) {
    return dt.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
}
function escapeHTML(str) {
    return String(str).replace(/[&<>\"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

// Initial load
document.addEventListener("DOMContentLoaded", async () => {
    await loadBirthdays();
});

</script>
</body>
</html>
